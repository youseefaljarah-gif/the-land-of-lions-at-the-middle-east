<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTEL CORE SYSTEM</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="login">
    <h1>INTEL CORE ACCESS</h1>
    <input type="password" id="password" placeholder="Access Key">
    <button onclick="login()">ENTER</button>
    <p id="error"></p>
</div>

<div id="system">

    <div class="topbar">
        SYSTEM STATUS: <span id="status">SECURE</span>
        | THREAT LEVEL: <span id="threatLevel">LOW</span>
    </div>

    <div class="container">

        <div class="sidebar">
            <button onclick="showSection('dashboard')">Dashboard</button>
            <button onclick="showSection('analysis')">Threat Analysis</button>
            <button onclick="showSection('database')">Database</button>
            <button onclick="showSection('logs')">Live Logs</button>
            <button onclick="logout()">Logout</button>
        </div>

        <div class="main">

            <div id="dashboard" class="section">
                <h2>Operational Overview</h2>
                <div class="card">Active Targets: <span id="targets">5</span></div>
                <div class="card">System Load: <span id="load">30%</span></div>
            </div>

            <div id="analysis" class="section">
                <h2>Threat Percentage</h2>
                <div class="progress">
                    <div id="bar"></div>
                </div>
            </div>

            <div id="database" class="section">
                <h2>Internal Records</h2>
                <ul id="records"></ul>
            </div>

            <div id="logs" class="section">
                <h2>Live Activity Logs</h2>
                <div id="terminal"></div>
            </div>

        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
