<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Sentinel AI | منصة الرصد الاستخباراتي</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --ai-gold: #ffcc00; --tech-blue: #0066ff; --danger: #ff3300; --bg: #020408; --panel: #0f172a; }
        body { background: var(--bg); color: #d1d5db; font-family: 'Segoe UI', sans-serif; margin: 0; }
        nav { background: rgba(15, 22, 36, 0.9); padding: 15px 5%; display: flex; justify-content: space-between; border-bottom: 1px solid var(--tech-blue); position: sticky; top: 0; z-index: 1000; }
        .pulse { width: 10px; height: 10px; background: var(--ai-gold); border-radius: 50%; animation: p 2s infinite; display: inline-block; margin-left: 10px; }
        @keyframes p { 0% { box-shadow: 0 0 0 0 rgba(255,204,0,0.4); } 100% { box-shadow: 0 0 0 15px rgba(255,204,0,0); } }
        .container { padding: 30px 5%; display: grid; grid-template-columns: 1fr 350px; gap: 25px; }
        #map { height: 500px; border-radius: 15px; border: 1px solid #1e293b; }
        .ai-box { background: var(--panel); padding: 25px; border-radius: 15px; border: 1px solid #2d3748; margin-top: 20px; }
        .btn-ai { background: linear-gradient(90deg, var(--tech-blue), #00d4ff); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        #ai-output { margin-top: 15px; padding: 15px; background: #000; border-radius: 8px; color: #00ffcc; font-family: monospace; display: none; border-right: 3px solid var(--ai-gold); }
        .risk-card { background: #111827; padding: 15px; margin-bottom: 15px; border-right: 4px solid var(--tech-blue); }
        .high { border-right-color: var(--danger); }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<nav>
    <div style="font-weight: bold; font-size: 1.3rem;">GLOBAL SENTINEL <span style="color: var(--tech-blue);">AI</span></div>
    <div style="color: var(--ai-gold); font-size: 0.8rem;"><div class="pulse"></div> نظام الذكاء الاصطناعي: نشط</div>
</nav>
<div class="container">
    <main>
        <div id="map"></div>
        <div class="ai-box">
            <h3>🤖 محرك المحاكاة الاستخباراتي (AI Engine)</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-ai" onclick="runAI('conflict')">صراع إيران-إسرائيل</button>
                <button class="btn-ai" onclick="runAI('usa')">تحرك الولايات المتحدة</button>
                <button class="btn-ai" onclick="runAI('china')">محور روسيا والصين</button>
                <button class="btn-ai" onclick="runAI('gulf')">أمن الخليج العربي</button>
            </div>
            <div id="ai-output"></div>
        </div>
    </main>
    <aside>
        <div class="ai-box">
            <h4>⚠️ مؤشر مخاطر التجارة</h4>
            <div class="risk-card high"><strong>مضيق هرمز</strong><p>الخطر: 94% - تهديد إمدادات الطاقة.</p></div>
            <div class="risk-card high"><strong>البحر الأحمر</strong><p>الخطر: 89% - سلاسل الإمداد معطلة.</p></div>
            <div class="risk-card"><strong>بحر الصين الجنوبي</strong><p>الخطر: 45% - مراقبة النشاط.</p></div>
        </div>
    </aside>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([30.0, 45.0], 3);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    const centers = [{n:"واشنطن", p:[38.8, -77.0], c:"blue"}, {n:"موسكو", p:[55.7, 37.6], c:"red"}, {n:"بكين", p:[39.9, 116.4], c:"yellow"}, {n:"منطقة الصراع", p:[32.0, 45.0], c:"orange"}];
    centers.forEach(h => L.circle(h.p, {color: h.c, radius: 400000, fillOpacity: 0.3}).addTo(map).bindPopup(h.n));
    function runAI(mode) {
        const out = document.getElementById('ai-output'); out.style.display = 'block';
        out.


innerHTML = "> جاري استدعاء الخوارزمية...<br>> تحليل مسارات التجارة...";
        setTimeout(() => {
            let msg = "";
            if(mode === 'conflict') msg = "تنبؤ AI: أي مواجهة مباشرة تعني إغلاق مضيق هرمز فوراً، ارتفاع النفط لـ 150$، وانهيار في تأمين الشحن البحري.";
            if(mode === 'usa') msg = "تنبؤ AI: تحرك الأساطيل الأمريكية سيعزز الردع لكنه يزيد من احتمالية الصدام المباشر في الممرات الدولية.";
            if(mode === 'china') msg = "تنبؤ AI: التحالف الروسي-الصيني يسعى لفرض واقع جيوسياسي جديد يهدد هيمنة الدولار في التجارة العالمية.";
            if(mode === 'gulf') msg = "تنبؤ AI: دول الخليج تمثل صمام أمان الاقتصاد العالمي؛ أي اهتزاز أمني هناك يعني ركوداً عالمياً شاملاً.";
            out.innerHTML = <strong>التحليل الاستخباراتي:</strong><br>${msg};
        }, 1200);
    }
</script>
</body>
</html>
