<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع البحث الاستراتيجي في الشرق الأوسط</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #222;
            margin: 0;
        }
        header {
            background: #003366;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        #news-feed {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .news-item {
            background: #fff;
            padding: 15px;
            border-left: 5px solid #cc0000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            text-align: center;
            padding: 15px;
            background: #003366;
            color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>موقع البحث الاستراتيجي في الشرق الأوسط</h1>
        <p>تحليل الأحداث السياسية والجيوسياسية في المنطقة</p>
    </header>

    <main id="news-feed"></main>

    <footer>
        <p>تم تطوير الموقع بواسطة Youseef Al Jarah</p>
    </footer>

    <script>
        // بيانات الأخبار مدمجة مباشرة داخل الكود
        const newsData = [
            {
                "title": "تطورات جديدة في الصراع بين إيران وإسرائيل",
                "content": "تفاصيل الأحداث الأخيرة بين إيران وإسرائيل...",
                "analysis": "عالي الاهتمام"
            },
            {
                "title": "الولايات المتحدة تتدخل في المنطقة",
                "content": "تحركات الولايات المتحدة الأخيرة في الشرق الأوسط...",
                "analysis": "متوسط الاهتمام"
            },
            {
                "title": "فصائل المقاومة تعلن مواقف جديدة",
                "content": "تصريحات فصائل المقاومة حول الوضع الراهن...",
                "analysis": "عالي الاهتمام"
            }
        ];

        // عرض الأخبار على الصفحة
        const feed = document.getElementById('news-feed');
        newsData.forEach(article => {
            const div = document.createElement('div');
            div.className = 'news-item';
            div.innerHTML = `
                <h2>${article.title}</h2>
                <p>${article.content}</p>
                <strong>تحليل: ${article.analysis}</strong>
            `;
            feed.appendChild(div);
        });
    </script>
</body>
</html>
