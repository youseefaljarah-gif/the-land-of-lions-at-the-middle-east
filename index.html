<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live News Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Live News Portal</h1>
  <nav>
    <a href="#home">🏠 Home</a>
    <a href="#live">📺 Live</a>
    <a href="#news">📰 News</a>
    <a href="#channels">📍 Channels</a>
    <a href="#contact">📩 Contact</a>
  </nav>
</header>

<div class="container">

<section id="home">
  <h2>مرحبا!</h2>
  <p>تابع أهم البثوث الإخبارية الحيّة من القنوات العربية والعالمية.</p>
</section>

<section id="live">
  <h2>Live Stream</h2>
  <iframe id="stream" width="100%" height="500"
    src="https://www.youtube.com/embed/live_stream?channel=@alarabytv/live"
    frameborder="0" allowfullscreen></iframe>
  <p id="viewers"></p>

  <div id="ads">
    <p style="color:darkblue; font-weight:bold;">[مكان إعلان AdSense]</p>
  </div>
</section>

<section id="news">
  <h2>Latest News</h2>
  <ul id="newsList"></ul>
</section>

<section id="channels">
  <h2>Channels</h2>
  <button onclick="changeStream('@alarabytv/live')">العربي مباشر</button>
  <button onclick="changeStream('@aljazeeramubasher/live')">الجزيرة مباشر</button>
  <button onclick="changeStream('@alhadath/live')">قناة الحدث</button>
  <button onclick="changeStream('@bbclive')">BBC News Live</button>
  <button onclick="changeStream('@reuterslive')">Reuters Live</button>
  <button onclick="changeStream('@cnnnews')">CNN News Live</button>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>للتواصل: info@example.com</p>
</section>

</div>

<footer>
  <p>&copy; 2026 Live News Portal</p>
</footer>

<script src="script.js"></script>
</body>
</html>
