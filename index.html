<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live News Portal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Live News Portal</h1>
  <nav>
    <a href="#home">🏠 Home</a>
    <a href="#live">📺 Live</a>
    <a href="#news">📰 News</a>
    <a href="#channels">📍 Channels</a>
    <a href="#contact">📩 Contact</a>
  </nav>
</header>

<div class="container">

<section id="home">
  <h2>مرحبا!</h2>
  <p>تابع أهم البثوث الإخبارية الحيّة من القنوات التي تعمل ضمن الموقع.</p>
</section>

<section id="live">
  <h2>Live Stream</h2>
  <iframe id="stream" width="100%" height="450"
    src="https://www.youtube.com/embed/live_stream?channel=UC16niRr50-MSBwiO3YDb3RA"
    frameborder="0" allowfullscreen></iframe>
  <p id="viewers"></p>

  <div id="ads">
    <p style="color:yellow; font-weight:bold;">[مكان إعلان AdSense]</p>
  </div>
</section>

<section id="news">
  <h2>Latest News</h2>
  <ul id="newsList"></ul>
</section>

<section id="channels">
  <h2>Channels</h2>
  
  <!-- قنوات تعمل داخل iframe -->
  <button onclick="changeStream('UC16niRr50-MSBwiO3YDb3RA')">الجزيرة مباشر</button>
  <button onclick="changeStream('UCfiwzLy-8yKzIbsmZTzxDgw')">قناة الحدث</button>

  <hr style="border-top: 1px solid #555; margin:10px 0;">

  <!-- قنوات تفتح في نافذة جديدة -->
  <button onclick="openExternal('https://www.youtube.com/c/AlSumariaTV/live')">السومرية نيوز مباشر</button>
  <button onclick="openExternal('https://www.youtube.com/c/NRTOfficialLive/live')">NRT Live</button>
  <button onclick="openExternal('https://www.youtube.com/c/RudawEnglish/live')">Rudaw Live</button>
  <button onclick="openExternal('https://www.youtube.com/c/AlArabiya/live')">العربية مباشر</button>

</section>

<section id="contact">
  <h2>Contact</h2>
  <p>للتواصل: info@example.com</p>
</section>

</div>

<footer>
  <p>&copy; 2026 Live News Portal</p>
</footer>

<script src="script.js"></script>
</body>
</html>
