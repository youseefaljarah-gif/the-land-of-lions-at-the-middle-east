<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTEL CORE SYSTEM</title>

<style>
body{
    margin:0;
    font-family:Consolas, monospace;
    background:#0a0f1c;
    color:#00ffcc;
    overflow:hidden;
}

/* شاشة تسجيل الدخول */
#loginScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:#0a0f1c;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#loginScreen input{
    padding:10px;
    margin:10px;
    background:#111;
    border:1px solid #00ffcc;
    color:#00ffcc;
    width:250px;
}

#loginScreen button{
    padding:10px 20px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

#dashboard{
    display:none;
    height:100vh;
}

/* الشريط الجانبي */
.sidebar{
    width:220px;
    background:#111827;
    height:100%;
    float:left;
    padding-top:20px;
}

.sidebar h2{
    text-align:center;
    color:#00ffcc;
}

.sidebar button{
    width:100%;
    padding:12px;
    background:none;
    border:none;
    color:#ccc;
    text-align:left;
    cursor:pointer;
}

.sidebar button:hover{
    background:#00ffcc22;
    color:#00ffcc;
}

/* المحتوى */
.main{
    margin-left:220px;
    padding:20px;
}

.card{
    background:#111827;
    padding:20px;
    margin:15px 0;
    border-left:4px solid #00ffcc;
}

.counter{
    font-size:28px;
    font-weight:bold;
    color:#ff4c4c;
}

/* تأثير خط المسح */
.scan{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
    background:linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0,255,204,0.05) 50%,
        transparent 100%
    );
    animation:scan 5s linear infinite;
}

@keyframes scan{
    0%{transform:translateY(-100%);}
    100%{transform:translateY(100%);}
}
</style>
</head>

<body>

<div id="loginScreen">
    <h1>INTEL ACCESS</h1>
    <input type="text" placeholder="Agent ID">
    <input type="password" placeholder="Access Key">
    <button onclick="enterSystem()">ENTER</button>
</div>

<div id="dashboard">
    <div class="sidebar">
        <h2>INTEL CORE</h2>
        <button onclick="showSection('overview')">Overview</button>
        <button onclick="showSection('operations')">Operations</button>
        <button onclick="showSection('alerts')">Alerts</button>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="main">
        <div id="overview" class="section">
            <div class="card">
                Active Operations:
                <div class="counter" id="opCounter">0</div>
            </div>
            <div class="card">
                System Status: SECURE
            </div>
        </div>

        <div id="operations" class="section" style="display:none;">
            <div class="card">
                Operation Black Dawn - Monitoring...
            </div>
            <div class="card">
                Operation Silent Shield - Active...
            </div>
        </div>

        <div id="alerts" class="section" style="display:none;">
            <div class="card">
                ⚠ Suspicious network activity detected.
            </div>
            <div class="card">
                ⚠ Encrypted transmission intercepted.
            </div>
        </div>
    </div>
</div>

<div class="scan"></div>

<script>
function enterSystem(){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("dashboard").style.display="block";
}

function logout(){
    document.getElementById("dashboard").style.display="none";
    document.getElementById("loginScreen").style.display="flex";
}

function showSection(id){
    document.querySelectorAll(".section").forEach(sec=>sec.style.display="none");
    document.getElementById(id).style.display="block";
}

/* عداد عمليات مباشر */
let counter=0;
setInterval(()=>{
    counter++;
    document.getElementById("opCounter").innerText=counter;
},1000);
</script>

</body>
</html>
