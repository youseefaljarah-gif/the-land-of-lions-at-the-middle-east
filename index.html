<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز التحليل الاستراتيجي الحقيقي</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>مركز التحليل الاستراتيجي – مستوى التوتر في الشرق الأوسط</header>

<div class="container">
    <div class="sidebar">
        <button onclick="show('overview')">نظرة عامة</button>
        <button onclick="show('ai')">الذكاء الاصطناعي</button>
        <button onclick="show('logs')">سجل المتابعة</button>
    </div>

    <div class="main">
        <div id="overview" class="section">
            <div class="card">
                مستوى التوتر الإقليمي: <b id="tension">جارٍ التحليل...</b>
            </div>
            <div class="card">div class="progress"><div id="tensionBar"></مؤشر التوتر الرقمي: <div class="progress"><div id="tensionBar/div>
            </div>
        </div>

        <div id="ai" class="section">
            <div class="card">
                <h3>نظام الأسئلة والأجوبة الذكي</h3>
                <input type="text" id="userQuestion" placeholder="اكتب سؤالك هنا" style="width:80%;padding:8px;">
                <button onclick="askAI()">اسأل</button>
                <p id="aiAnswer" style="margin-top:10px;color:#ffdd00;"></p>
            </div>
        </div>

        <div id="logs" class="section">
            <div class="card"><div id="logBox"></div></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
