<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yousif al jarah AI | Intelligence 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --gold: #d4af37; --cyan: #00f2ff; --bg: #02040a; }
        body { background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; }
        
        /* الهيدر */
        header { 
            background: #0d1117; padding: 20px; border-bottom: 2px solid var(--gold);
            text-align: center; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        .user-id { font-size: 1.6rem; font-weight: bold; color: var(--gold); text-transform: uppercase; }

        /* محرك البحث المفعل */
        .search-box { background: #161b22; padding: 30px; text-align: center; }
        #ai-query { 
            width: 50%; padding: 12px; border-radius: 5px; border: 1px solid var(--cyan); 
            background: #000; color: #fff; outline: none;
        }
        .search-btn { 
            padding: 12px 25px; border-radius: 5px; background: var(--cyan); 
            border: none; cursor: pointer; font-weight: bold; color: #000;
        }

        .main-frame { display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 20px; }
        #map { height: 500px; border-radius: 10px; border: 1px solid #30363d; }

        .terminal { 
            background: #000; padding: 20px; border-radius: 10px; border: 1px solid var(--cyan);
            color: #00ff41; font-family: 'Courier New', monospace; min-height: 300px; overflow-y: auto;
        }
        .log-entry { margin-bottom: 10px; border-bottom: 1px solid #111; padding-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <div class="user-id">🛡️ Intelligence Director: Yousif al jarah</div>
    <div style="font-size: 0.8rem; color: var(--cyan);">AI ANALYTICS CORE v3.0 | MARCH 2026</div>
</header>

<div class="search-box">
    <input type="text" id="ai-query" placeholder="أدخل اسم الطرف (مثال: الفصائل العراقية، حزب الله، إسرائيل)...">
    <button class="search-btn" onclick="executeAI()">تشغيل المحرك</button>
</div>

<div class="main-frame">
    <div id="map"></div>
    <div class="terminal" id="terminal-out">
        > نظام Yousif al jarah بانتظار الأوامر...
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // إعداد الخريطة
    var map = L.map('map').setView([33.3, 44.4], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // خوارزمية البحث والتحليل (الذكاء الاصطناعي الخاص بك)
    const database = {
        "العراق": "تنبؤ 2026: زيادة في عمليات الفصائل العراقية ضد القواعد الأمريكية. التداعيات: خطر التصعيد الإقليمي وتهديد أمن الطاقة في البصرة.",
        "إيران": "تحليل استراتيجي: ضغط عسكري مباشر على المنشآت الحيوية. رد الفعل: إغلاق مضيق هرمز وانهيار سلاسل الإمداد العالمية.",
        "حزب الله": "رصد ميداني: استنفار كامل على الخط الأزرق. سيناريو الحرب الشاملة سيؤدي لدمار كبير في البنية التحتية للطاقة في المنطقة.",
        "إسرائيل": "تقييم أمني: القبة الحديدية تواجه ضغطاً غير مسبوق من 3 جبهات متزامنة. تداعيات: شلل تام في الاقتصاد الإسرائيلي.",
        "أمريكا": "تحركات الأساطيل: الردع الأمريكي يركز على حماية ممرات التجارة، لكن خطر الانزلاق لحرب برية يزداد بنسبة 60%."
    };

    function executeAI() {
        const query = document.getElementById('ai-query').value;
        const out = document.getElementById('terminal-out');
        
        out.innerHTML = <div class='log-entry'>> جاري البحث في أرشيف Yousif al jarah...</div>;
        
        setTimeout(() => {
            let found = false;
            for (let key in database) {
                if (query.includes(key)) {
                    out.innerHTML += <div class='log-entry' style='color:var(--gold)'>> تم العثور على تحليل لـ ${key}:</div>;
                    out.innerHTML += <div class='log-entry'>> ${database[key]}</div>;
                    found = true;


break;
                }
            }
            if (!found) {
                out.innerHTML += <div class='log-entry' style='color:red'>> خطأ: البيانات غير كافية لهذا المدخل. حاول البحث عن (العراق، إيران، حزب الله).</div>;
            }
        }, 1000);
    }
</script>

</body>
</html>
